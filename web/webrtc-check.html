<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArchIToken-VPN WebRTC Leak Check</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #101116; color: #f3efe4; }
    body { margin: 0; padding: 28px; }
    main { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 16px; }
    button { padding: 10px 14px; border: 1px solid #c29b47; background: #171820; color: #f3efe4; cursor: pointer; }
    pre { white-space: pre-wrap; background: #171820; border: 1px solid #2d2f38; padding: 16px; min-height: 260px; }
    .muted { color: #a7a4a0; }
  </style>
</head>
<body>
<main>
  <h1>ArchIToken-VPN WebRTC 泄漏检测</h1>
  <p class="muted">检测浏览器 WebRTC ICE candidate。若看到非 VPN 公网 IP 或本地网段暴露，需要在浏览器中禁用非代理 UDP。</p>
  <button id="run">开始检测</button>
  <pre id="out">等待检测...</pre>
</main>
<script>
const out = document.getElementById('out');
const stunServers = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:global.stun.twilio.com:3478' }
];

function candidateAddresses(text) {
  const ipv4 = new Set();
  const ipv6 = new Set();
  const mdns = new Set();
  for (const m of text.matchAll(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g)) {
    const parts = m[0].split('.').map(Number);
    if (parts.every(x => x >= 0 && x <= 255)) ipv4.add(m[0]);
  }
  for (const m of text.matchAll(/\b[0-9a-f]{1,4}(?::[0-9a-f]{1,4}){2,7}\b/ig)) {
    ipv6.add(m[0]);
  }
  for (const m of text.matchAll(/\b[a-z0-9-]+\.local\b/ig)) {
    mdns.add(m[0]);
  }
  return { ipv4: [...ipv4], ipv6: [...ipv6], mdns: [...mdns] };
}

function formatAddresses(addresses) {
  const parts = [];
  if (addresses.ipv4.length) parts.push('IPv4: ' + addresses.ipv4.join(', '));
  if (addresses.ipv6.length) parts.push('IPv6: ' + addresses.ipv6.join(', '));
  if (addresses.mdns.length) parts.push('mDNS 隐藏地址: ' + addresses.mdns.join(', '));
  return parts.length ? parts.join('\n') : '未暴露可读 IP，仅有浏览器隐藏候选或空候选';
}

async function runCheck() {
  out.textContent = '检测中...\n';
  if (!('RTCPeerConnection' in window)) {
    out.textContent += 'WebRTC: 当前浏览器不支持 RTCPeerConnection。\n';
    return;
  }
  const pc = new RTCPeerConnection({ iceServers: stunServers });
  const seen = new Set();
  pc.createDataChannel('architoken-vpn-check');
  pc.onicecandidate = ev => {
    if (!ev.candidate) return;
    const c = ev.candidate.candidate;
    if (seen.has(c)) return;
    seen.add(c);
    out.textContent += '\n候选: ' + c + '\n' + formatAddresses(candidateAddresses(c)) + '\n';
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await new Promise(resolve => setTimeout(resolve, 5000));
  pc.close();
  out.textContent += '\n检测完成。结论：如果只看到 mDNS/隐藏地址，且没有真实公网 IPv4/IPv6，就是安全状态。\n';
}

document.getElementById('run').addEventListener('click', () => {
  runCheck().catch(err => out.textContent += '\n错误: ' + err.message + '\n');
});
</script>
</body>
</html>
